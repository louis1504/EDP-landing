document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px); display:flex; align-items:center; justify-content:center;\">\n        <sc-if value=\"{{ b_hasVideoUrl }}\" hint-placeholder-val=\"{{ false }}\">\n          <video id=\"vslVideo\" src=\"{{ b_vslUrl }}\" muted=\"\" loop=\"\" playsinline=\"\" preload=\"auto\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover;\"><\u002Fvideo>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ b_noVideoUrl }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;\">\n            <span style=\"font:600 12px/1 'Courier New',monospace; color:#6F6A5E;\">[ VSL en lecture · autoplay muet ]<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ b_soundMuted }}\" hint-placeholder-val=\"{{ true }}\">\n          <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_openOptin }}\" style=\"position:absolute; inset:0; width:100%; border:none; cursor:pointer; background:rgba(0,0,0,0.42); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:#F3EEE3;\">\n            <span style=\"width:64px; height:64px; border-radius:50%; background:linear-gradient(180deg,#F0D89B,#D7B25C); display:flex; align-items:center; justify-content:center; font-size:26px; color:#16120A; animation:edpPulse 2.4s ease-in-out infinite;\">🔇<\u002Fspan>\n            <span style=\"font:700 13px/1.2 Archivo,sans-serif; text-transform:uppercase; letter-spacing:.04em;\">Cliquez pour activer le son<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ b_soundOn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; font-size:16px;\">🔊<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"position:absolute; left:0; right:0; bottom:0; height:6px; background:rgba(255,255,255,0.14);\">\n          <div id=\"vslProgress\" style=\"height:100%; width:0%; background:linear-gradient(90deg,#C9A24B,#E3C27E,#F0D89B);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:10px 4px 0; text-align:center; font:400 12px/1.4 Archivo,sans-serif; color:#8C8576;\">Ta vidéo a commencé — active le son.<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ b_optinOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:50; background:rgba(7,7,8,0.97); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto;\">\n        <div style=\"width:100%; max-width:340px; background:#141312; border:1px solid rgba(227,194,126,0.3); border-radius:20px; padding:24px 20px; position:relative;\">\n          <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_closeOptin }}\" style=\"position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,255,255,0.18); background:transparent; color:#F3EEE3; font:400 16px/1 Archivo,sans-serif; cursor:pointer;\">×<\u002Fdiv>\n          <div style=\"text-align:center; margin-bottom:18px;\">\n            <div style=\"width:50px; height:50px; border-radius:50%; background:rgba(227,194,126,0.14); border:1px solid rgba(227,194,126,0.45); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:20px;\">🔊<\u002Fdiv>\n            <h3 style=\"margin:0 0 6px; font:600 19px/1.25 Archivo,sans-serif; color:#F3EEE3;\">Active le son<\u002Fh3>\n            <p style=\"margin:0; font:400 13px/1.5 Archivo,sans-serif; color:#9A9486;\">Entre tes infos pour débloquer l’audio et voir la méthode au complet.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <input value=\"{{ b_oNom }}\" sc-ca ar-gradient(180deg,#F0D89B,#D7B25C); color:#16120A; font:700 15px/1 Archivo,sans-serif; cursor:pointer; opacity:{{ b_optinOpacity }};\">Activer le son →<\u002Fdiv>\n          <p style=\"margin:10px 0 0; text-align:center; font:400 11px/1.4 Archivo,sans-serif; color:#6F6A5E;\">100% gratuit · tes infos restent confidentielles · désabonnement en 1 clic<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div id=\"quizB\" style=\"padding:{{ b_quizPad }}; background:#0E0E0F; border-top:1px solid rgba(255,255,255,0.07);\">\n      <h2 style=\"margin:0 0 6px; font:400 30px/0.98 Anton,sans-serif; text-transform:uppercase;\">Découvre si tu peux y arriver, toi aussi.<\u002Fh2>\n      <p style=\"margin:0 0 20px; font:400 14px/1.4 Archivo,sans-serif; color:#9A9486;\">4 questions · 30 secondes<\u002Fp>\n\n      <div style=\"background:#161514; border:1px solid rgba(227,194,126,0.18); border-radius:20px; padding:20px;\">\n        <sc-if value=\"{{ b_showOpts }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n              <span style=\"font:600 12px/1 Archivo,sans-serif; letter-spacing:.06em; color:#E3C27E;\">{{ b_stepLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:6px; border-radius:99px; background:rgba(255,255,255,0.08); overflow:hidden; margin-bottom:20px;\"><div style=\"height:100%; border-radius:99px; background:linear-gradient(90deg,#5FD08A,#E3C27E); width:{{ b_progress }};\"><\u002Fdiv><\u002Fdiv>\n            <h3 style=\"margin:0 0 18px; font:600 20px/1.25 Archivo,sans-serif;\">{{ b_q }}<\u002Fh3>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ b_opts }}\" as=\"item\" hint-placeholder-count=\"4\">\n                <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ item.onTap }}\" style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; width:100%; text-align:left; padding:16px; border-radius:13px; background:{{ item.bg }}; border:1px solid {{ item.bd }}; color:#F3EEE3; font:500 15px/1.25 Archivo,sans-serif; cursor:pointer;\" style-hover=\"border-color:#E3C27E;\">\n                  <span>{{ item.label }}<\u002Fspan>\n                  <sc-if value=\"{{ item.selected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:20px; height:20px; border-radius:50%; background:#E3C27E; color:#16120A; font:700 12px/20px Archivo,sans-serif; text-align:center; flex:0 0 auto;\">✓<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ b_isMulti }}\" hint-placeholder-val=\"{{ false }}\">\n              <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_next }}\" style=\"margin-top:16px; width:100%; padding:16px; border:none; border-radius:13px; background:linear-gradient(180deg,#F0D89B,#D7B25C); color:#16120A; font:700 16px/1 Archivo,sans-serif; cursor:pointer;\">Continuer →<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ b_notStart }}\" hint-placeholder-val=\"{{ false }}\">\n              <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_back }}\" style=\"margin-top:12px; width:100%; padding:8px; border:none; background:transparent; color:#8C8576; font:500 13px/1 Archivo,sans-serif; cursor:pointer;\">← Retour<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ b_showDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center; padding:14px 4px;\">\n            <div style=\"width:60px; height:60px; border-radius:50%; background:rgba(95,208,138,0.14); border:1px solid rgba(95,208,138,0.5); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; color:#5FD08A; font:700 28px/1 Archivo,sans-serif;\">✓<\u002Fdiv>\n            <h3 style=\"margin:0 0 8px; font:600 22px/1.25 Archivo,sans-serif;\">{{ b_outcomeTitle }}<\u002Fh3>\n            <p style=\"margin:0 0 20px; font:400 15px/1.55 Archivo,sans-serif; color:#9A9486;\">{{ b_outcomeMsg }}<\u002Fp>\n            <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_openCal }}\" style=\"width:100%; border:none; cursor:pointer; padding:17px; border-radius:13px; background:linear-gradient(180deg,#F0D89B,#D7B25C); color:#16120A; font:700 16px/1 Archivo,sans-serif;\">Choisir un créneau d’appel →<\u002Fdiv>\n            <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_reset }}\" style=\"margin-top:12px; width:100%; padding:8px; border:none; background:transparent; color:#8C8576; font:500 13px/1 Archivo,sans-serif; cursor:pointer;\">Refaire le test<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ b_showBlocked }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center; padding:14px 4px;\">\n            <h3 style=\"margin:0 0 8px; font:600 21px/1.3 Archivo,sans-serif;\">Pas le bon moment.<\u002Fh3>\n            <p style=\"margin:0 0 20px; font:400 15px/1.55 Archivo,sans-serif; color:#9A9486;\">La méthode est bâtie pour les parieurs sérieux, prêts à investir. La porte reste ouverte quand tu le seras. Joue de façon responsable — ne mise que ce que tu peux te permettre de perdre.<\u002Fp>\n            <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_back }}\" style=\"width:100%; padding:14px; border:1px solid rgba(255,255,255,0.18); border-radius:13px; background:transparent; color:#F3EEE3; font:600 14px/1 Archivo,sans-serif; cursor:pointer;\">← Retour<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:34px 0 30px; border-top:1px solid rgba(255,255,255,0.07);\">\n      <div style=\"padding:{{ b_testiHeadPad }};\">\n        <h2 style=\"margin:0; font:400 30px/0.98 Anton,sans-serif; text-transform:uppercase;\">Du vrai monde, des vrais résultats<\u002Fh2>\n      <\u002Fdiv>\n      <div id=\"testiSlider\" class=\"edp-x\" style=\"display:flex; gap:14px; overflow-x:auto; padding:{{ b_testiPad }};\">\n        <sc-for list=\"{{ testimonials }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <div data-testi-card=\"1\" style=\"flex:0 0 198px; background:#141312; border:1px solid rgba(227,194,126,0.16); border-radius:18px; overflow:hidden;\">\n            <div style=\"position:relative; aspect-ratio:9/16; background:#000;\">\n              <video id=\"{{ t.domId }}\" src=\"{{ t.video }}\" playsinline=\"\" preload=\"auto\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover;\"><\u002Fvideo>\n              <sc-if value=\"{{ t.showPlay }}\" hint-placeholder-val=\"{{ true }}\">\n                <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ t.onPlay }}\" style=\"position:absolute; inset:0; width:100%; border:none; cursor:pointer; background:rgba(0,0,0,0.32); display:flex; align-items:center; justify-content:center;\">\n                  <span style=\"width:54px; height:54px; border-radius:50%; background:linear-gradient(180deg,#F0D89B,#D7B25C); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(0,0,0,0.4);\">\n                    <span style=\"width:0;height:0;border-style:solid;border-width:9px 0 9px 14px;border-color:transparent transparent transparent #16120A; margin-left:3px;\"><\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"flex:0 0 6px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"callB\" style=\"padding:{{ b_callPad }}; border-top:1px solid rgba(227,194,126,0.16); background:radial-gradient(120% 80% at 50% 100%, rgba(227,194,126,0.12), transparent 60%);\">\n      <h2 style=\"margin:0 0 14px; font:400 34px/0.96 Anton,sans-serif; text-transform:uppercase;\">Prêt à parier comme un investisseur ?<\u002Fh2>\n      <p style=\"margin:0 0 22px; font:400 15px/1.6 Archivo,sans-serif; color:#C5BFB2;\">15 min. On regarde ta façon de parier, on te dit franchement si la méthode peut te rendre rentable. Aucun revenu garanti.<\u002Fp>\n      <a href=\"#quizB\" style=\"display:block; text-decoration:none; text-align:center; padding:18px; border-radius:15px; background:linear-gradient(180deg,#F0D89B,#D7B25C); color:#16120A; font:700 16px/1 Archivo,sans-serif; box-shadow:0 12px 30px rgba(217,178,92,0.3);\">Réserver mon appel stratégique<\u002Fa>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ b_calOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:50; background:rgba(7,7,8,0.96); backdrop-filter:blur(6px); display:flex; flex-direction:column;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid rgba(227,194,126,0.18); flex:0 0 auto;\">\n          <span style=\"font:600 14px/1.2 Archivo,sans-serif; color:#F3EEE3;\">Réserve ton appel stratégique<\u002Fspan>\n          <div role=\"button\" tabindex=\"0\" sc-camel-on-click=\"{{ b_closeCal }}\" style=\"width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,0.18); background:transparent; color:#F3EEE3; font:400 18px/1 Archivo,sans-serif; cursor:pointer;\">×<\u002Fdiv>\n        <\u002Fdiv>\n        <iframe src=\"{{ b_calUrl }}\" title=\"Calendrier GHL\" style=\"flex:1 1 auto; width:100%; border:none; background:#fff;\"><\u002Fiframe>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"padding:18px 22px; background:#070708; font:400 11px/1.5 Archivo,sans-serif; color:#6F6A5E;\">\n      <p style=\"margin:0 0 8px;\">Jeu responsable · 18+ · Ne mise que ce que tu peux te permettre de perdre. Résultats individuels — aucun revenu garanti; le passé ne garantit pas l’avenir.<\u002Fp>\n      <p style=\"margin:0 0 8px;\">NOT FACEBOOK : ce site ne fait pas partie de Facebook / Meta et n’est pas approuvé par eux.<\u002Fp>\n      <p style=\"margin:0;\"><span style=\"color:#9A9486; text-decoration:underline;\">Confidentialité<\u002Fspan> · <span style=\"color:#9A9486; text-decoration:underline;\">Conditions<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  QUIZ = [\n    {key:'paris', type:'single', q:'Tu paries déjà sur le sport ?', opts:['Oui, régulièrement','Oui, de temps en temps','Pas encore']},\n    {key:'objectif', type:'single', q:'Tu vises quoi avec les paris ?', opts:['Devenir rentable avec une vraie méthode','Mieux gérer ma bankroll et ma discipline','Me refaire vite, faire de l’argent vite']},\n    {key:'invest', type:'single', q:'La vraie méthode demande d’investir sérieusement. T’es prêt à mettre les moyens ?', opts:['Oui, prêt à investir','Je veux d’abord les détails à l’appel','Non, pas en ce moment']},\n    {key:'timing', type:'single', q:'Si on confirme que t’as le bon profil, tu veux commencer quand ?', opts:['Le plus vite possible','Dans les prochaines semaines','Je regarde, sans plus']},\n  ];\n\n  // ↓ Remplace par l'URL d'embed de TON calendrier GHL (Calendars → Embed Code → l'URL dans src=\"…\")\n  CAL_BASE = 'https://api.leadconnectorhq.com/widget/booking/oSdduoOYLFe5IY7ia0z7';\n  LEAD_WEBHOOK = ''; // (optionnel) URL d'un Inbound Webhook GHL — crée le contact à la soumission\n\n  VSL_SECONDS = 765; // 12:45 — durée de la VSL, cale la smart progress bar\n  VSL_URL = 'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/6a5914a5a6ed1b8e1b1201b3.mp4';\n\n  state = {\n    B: {step:0, answers:{}, sports:[], done:false, blocked:false, calOpen:false, soundOn:false, optinOpen:false, oNom:'', oEmail:'', oTel:'', age18:false, consent:false, testiPlaying:-1, isDesktop:false},\n  };\n\n  componentDidMount(){ this.initVideo(); this.startProgress(); this.startTestiAuto(); this.syncViewport(); this._onResize = () => this.syncViewport(); window.addEventListener('resize', this._onResize); this._onFormMsg = (e) => this.handleFormMsg(e); window.addEventListener('message', this._onFormMsg); this.startHeightReport(); }\n  startHeightReport(){\n    if (window.parent === window) return;\n    const post = () => { try { window.parent.postMessage({ __edpHeight: Math.ceil(document.documentElement.scrollHeight) }, '*'); } catch (e) {} };\n    post();\n    window.addEventListener('resize', post);\n    try { new ResizeObserver(post).observe(document.body); } catch (e) {}\n    this._hr = setInterval(post, 700);\n  }\n  initVideo(){ const v = document.getElementById('vslVideo'); if (v){ v.muted = true; const p = v.play(); if (p && p.catch) p.catch(() => {}); } }\n  componentWillUnmount(){ if (this._raf) cancelAnimationFrame(this._raf); this.stopTestiAuto(); if (this._onResize) window.removeEventListener('resize', this._onResize); if (this._onFormMsg) window.removeEventListener('message', this._onFormMsg); }\n  syncViewport(){ const d = window.matchMedia('(min-width:760px)').matches; if (this.state.B.isDesktop !== d) this.upd('B', {isDesktop:d}); }\n  handleFormMsg(e){\n    const d = e && e.data; if (!d) return;\n    let s = typeof d === 'string' ? d : String(d.type || d.event || d.eventName || d.action || '');\n    if (/submit/i.test(s) || d.formSubmitted === true || d.submitted === true){\n      if (this.state.B.optinOpen && !this.state.B.soundOn) this.unlockSound('B');\n    }\n  }\n  startTestiAuto(){ this.stopTestiAuto(); this._testiTimer = setInterval(() => this.advanceTesti(), 2000); }\n  stopTestiAuto(){ if (this._testiTimer){ clearInterval(this._testiTimer); this._testiTimer = null; } }\n  animateScrollTo(c, target, dur){\n    if (this._scrollRaf) cancelAnimationFrame(this._scrollRaf);\n    const startL = c.scrollLeft;\n    const dist = Math.max(0, target) - startL;\n    const t0 = performance.now();\n    const ease = (x) => 1 - Math.pow(1 - x, 3);\n    const stepFn = (now) => {\n      const p = Math.min(1, (now - t0) / dur);\n      c.scrollLeft = startL + dist * ease(p);\n      if (p < 1) this._scrollRaf = requestAnimationFrame(stepFn);\n    };\n    this._scrollRaf = requestAnimationFrame(stepFn);\n  }\n  advanceTesti(){\n    const c = document.getElementById('testiSlider');\n    if (!c) return;\n    const card = c.querySelector('[data-testi-card]');\n    const step = card ? card.offsetWidth + 14 : 212;\n    const len = this.TESTI.length;\n    const idx = (this._testiIdx == null ? 0 : this._testiIdx) + 1;\n    this.animateScrollTo(c, idx * step, 550);\n    if (idx >= len){\n      // arrivé sur le clone : on repositionne instantanément au début (invisible)\n      setTimeout(() => { const back = idx - len; c.scrollLeft = back * step; this._testiIdx = back; }, 620);\n    } else {\n      this._testiIdx = idx;\n    }\n  }\n  scrollTestiTo(i){\n    const c = document.getElementById('testiSlider');\n    if (!c) return;\n    const card = c.querySelector('[data-testi-card]');\n    const step = card ? card.offsetWidth + 14 : 212;\n    this._testiIdx = i;\n    this.animateScrollTo(c, i * step, 450);\n  }\n  startProgress(){\n    if (this._progressStarted) return; this._progressStarted = true;\n    const start = performance.now();\n    const totalMs = this.VSL_SECONDS * 1000;\n    const tick = (now) => {\n      const t = Math.min(1, (now - start) / totalMs);\n      const eased = 1 - Math.pow(1 - t, 5); // part très vite, ralentit fortement ensuite\n      const el = document.getElementById('vslProgress');\n      if (el) el.style.width = (eased * 100).toFixed(2) + '%';\n      if (t < 1) this._raf = requestAnimationFrame(tick);\n    };\n    this._raf = requestAnimationFrame(tick);\n  }\n\n  TESTI = [\n    {video:'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/69e7de46b0e5e2bb7f95eae0.mp4'},\n    {video:'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/69ef828b8acd760bf8c84eda.mp4'},\n    {video:'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/69a59b77ec04fe689cf91106.mp4'},\n    {video:'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/69a59b77e07e364ee4f71a0f.mp4'},\n    {video:'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/69a59b77fd146b139919fee0.mp4'},\n    {video:'https://assets.cdn.filesafe.space/cqLxmcEPqtmC97anW7gK/media/69a59b77e07e36a82cf71a05.mp4'},\n  ];\n\n  upd(dir, patch){ this.setState(s => ({ [dir]: {...s[dir], ...patch} })); }\n\n  pickSingle(dir, key, val){\n    const cur = this.state[dir];\n    const newAnswers = {...cur.answers, [key]:val};\n    if (key === 'objectif' && val === 'Me refaire vite, faire de l’argent vite'){\n      this.setState(s => ({ [dir]: {...s[dir], answers:newAnswers} }), () => this.endSurvey(dir, 'negative'));\n      return;\n    }\n    if (cur.step + 1 >= this.QUIZ.length){\n      this.setState(s => ({ [dir]: {...s[dir], answers:newAnswers} }), () => this.finishSurvey(dir));\n      return;\n    }\n    this.upd(dir, {answers:newAnswers, step:cur.step + 1});\n  }\n  fireEvent(name, detail){\n    try {\n      window.dataLayer = window.dataLayer || [];\n      window.dataLayer.push(Object.assign({event:name}, detail || {}));\n      window.dispatchEvent(new CustomEvent(name, {detail:detail || {}}));\n      console.log('[EDP event]', name, detail);\n      if (this.LEAD_WEBHOOK){ fetch(this.LEAD_WEBHOOK, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(Object.assign({event:name}, detail || {}))}).catch(() => {}); }\n    } catch (e) {}\n  }\n  openOptin(dir){ this.upd(dir, {optinOpen:true}); }\n  closeOptin(dir){ this.upd(dir, {optinOpen:false}); }\n  unlockSound(dir){\n    const s = this.state[dir];\n    if (!(s.oNom && s.oEmail && s.age18 && s.consent)) return;\n    this.fireEvent('lead_captured', {nom:s.oNom, email:s.oEmail, phone:s.oTel, age18:s.age18, consent:s.consent});\n    const v = document.getElementById('vslVideo'); if (v){ v.muted = false; const p = v.play(); if (p && p.catch) p.catch(() => {}); }\n    this.startProgress();\n    this.upd(dir, {soundOn:true, optinOpen:false});\n  }\n  finishSurvey(dir){\n    const neg = this.state[dir].answers.invest === 'Non, pas en ce moment';\n    this.endSurvey(dir, neg ? 'negative' : 'positive');\n  }\n  endSurvey(dir, outcome){\n    const s = this.state[dir];\n    this.fireEvent('survey_sent', {paris:s.answers.paris, objectif:s.answers.objectif, invest:s.answers.invest, timing:s.answers.timing, outcome:outcome, nom:s.oNom, email:s.oEmail, phone:s.oTel});\n    if (outcome === 'negative') this.upd(dir, {blocked:true}); else this.upd(dir, {done:true});\n  }\n  playTesti(dir, i){\n    this.stopTestiAuto();\n    document.querySelectorAll('video[id^=\"testi-\"]').forEach((v) => {\n      if (v.id !== 'testi-' + i){ v.pause(); v.muted = true; }\n    });\n    const v = document.getElementById('testi-' + i);\n    if (v){\n      v.muted = false;\n      try { v.currentTime = 0; } catch (e) {}\n      v.onended = () => { try { v.currentTime = 2; } catch (e) {} this.upd(dir, {testiPlaying:-1}); this.startTestiAuto(); };\n      const p = v.play(); if (p && p.catch) p.catch(() => {});\n    }\n    this.scrollTestiTo(i);\n    this.upd(dir, {testiPlaying:i});\n  }\n  toggleSport(dir, val){\n    const cur = this.state[dir];\n    const has = cur.sports.includes(val);\n    this.upd(dir, {sports: has ? cur.sports.filter(x => x !== val) : [...cur.sports, val]});\n  }\n  next(dir){ this.upd(dir, {step:this.state[dir].step + 1}); }\n  back(dir){ const c = this.state[dir]; if (c.blocked){ this.upd(dir, {blocked:false}); return; } this.upd(dir, {step:Math.max(0, c.step - 1)}); }\n  submit(dir){ this.upd(dir, {done:true, calOpen:true}); }\n  reset(dir){ this.upd(dir, {step:0, answers:{}, sports:[], done:false, blocked:false, calOpen:false}); }\n  setField(dir, f, v){ this.upd(dir, {[f]:v}); }\n\n  viewFor(dir){\n    const s = this.state[dir];\n    const steps = this.QUIZ;\n    const cur = steps[s.step];\n    const totalQ = 4;\n    const stepLabel = s.step < totalQ ? ('Question ' + (s.step + 1) + ' / ' + totalQ) : 'Dernière étape';\n    const progress = Math.round((s.step / (steps.length - 1)) * 100) + '%';\n    const isForm = cur.type === 'form';\n    const isMulti = cur.type === 'multi';\n    const first = (s.oNom || '').trim().split(' ')[0] || '';\n    const last = (s.oNom || '').trim().split(' ').slice(1).join(' ') || '';\n    const calUrl = this.CAL_BASE + (this.CAL_BASE.includes('?') ? '&' : '?') +\n      'first_name=' + encodeURIComponent(first) +\n      '&last_name=' + encodeURIComponent(last) +\n      '&email=' + encodeURIComponent(s.oEmail) +\n      '&phone=' + encodeURIComponent(s.oTel);\n    let opts = [];\n    if (cur.type === 'single'){\n      opts = cur.opts.map(o => ({label:o, selected:s.answers[cur.key] === o,\n        bg: s.answers[cur.key] === o ? 'rgba(227,194,126,0.14)' : 'rgba(255,255,255,0.03)',\n        bd: s.answers[cur.key] === o ? '#E3C27E' : 'rgba(255,255,255,0.10)',\n        onTap: () => this.pickSingle(dir, cur.key, o)}));\n    } else if (cur.type === 'multi'){\n      opts = cur.opts.map(o => ({label:o, selected:s.sports.includes(o),\n        bg: s.sports.includes(o) ? 'rgba(227,194,126,0.14)' : 'rgba(255,255,255,0.03)',\n        bd: s.sports.includes(o) ? '#E3C27E' : 'rgba(255,255,255,0.10)',\n        onTap: () => this.toggleSport(dir, o)}));\n    }\n    const outcomeTitle = 'T’as le bon profil.';\n    const outcomeMsg = 'On analyse ta façon de parier et on te dit franchement si la méthode peut te rendre rentable. Aucune pression, aucun revenu garanti.';\n    return {\n      stepLabel, q:cur.q, progress, opts, isMulti,\n      notStart: s.step > 0,\n      showOpts: !s.done && !s.blocked,\n      showDone: s.done,\n      showBlocked: s.blocked && !s.done,\n      soundOn: s.soundOn, soundMuted: !s.soundOn, optinOpen: s.optinOpen,\n      isDesktop: s.isDesktop,\n      cardMax: s.isDesktop ? '1120px' : '392px',\n      cardRadius: s.isDesktop ? '26px' : '34px',\n      pagePad: s.isDesktop ? '48px 28px' : '32px 16px',\n      sbDisplay: s.isDesktop ? 'none' : 'flex',\n      topStyle: s.isDesktop ? 'display:grid; grid-template-columns:1.05fr 0.95fr; gap:40px; align-items:center; padding:20px 48px 28px;' : 'display:block;',\n      headerPad: s.isDesktop ? '24px 30px 10px 44px' : '10px 22px 14px',\n      heroPad: s.isDesktop ? '4px 30px 8px 44px' : '8px 22px 26px',\n      heroSize: s.isDesktop ? '62px' : '46px',\n      videoPad: s.isDesktop ? '0' : '0 16px 26px',\n      quizPad: s.isDesktop ? '56px 28% 60px' : '30px 20px',\n      testiHeadPad: s.isDesktop ? '0 48px 20px' : '0 20px 18px',\n      testiPad: s.isDesktop ? '4px 48px 8px' : '4px 20px 8px',\n      callPad: s.isDesktop ? '60px 28% 66px' : '38px 20px 30px',\n      hasVideoUrl: !!this.VSL_URL, noVideoUrl: !this.VSL_URL, vslUrl: this.VSL_URL,\n      oNom:s.oNom, oEmail:s.oEmail, oTel:s.oTel,\n      onONom: e => this.setField(dir, 'oNom', e.target.value),\n      onOEmail: e => this.setField(dir, 'oEmail', e.target.value),\n      onOTel: e => this.setField(dir, 'oTel', e.target.value),\n      openOptin: () => this.openOptin(dir),\n      closeOptin: () => this.closeOptin(dir),\n      unlockSound: () => this.unlockSound(dir),\n      age18: s.age18, consent: s.consent,\n      onAge18: e => this.setField(dir, 'age18', e.target.checked),\n      onConsent: e => this.setField(dir, 'consent', e.target.checked),\n      optinOpacity: (s.oNom && s.oEmail && s.age18 && s.consent) ? '1' : '0.45',\n      outcomeTitle, outcomeMsg,\n      next: () => this.next(dir), back: () => this.back(dir),\n      reset: () => this.reset(dir),\n      calOpen: s.calOpen, calUrl,\n      openCal: () => this.upd(dir, {calOpen:true}),\n      closeCal: () => this.upd(dir, {calOpen:false}),\n    };\n  }\n\n  renderVals(){\n    if (!this._testiAutoInit){ this._testiAutoInit = true; setTimeout(() => this.startTestiAuto(), 200); }\n    const testimonials = [...this.TESTI, ...this.TESTI].map((t, i) => ({\n      video: t.video + '#t=2',\n      domId: 'testi-' + i,\n      showPlay: this.state.B.testiPlaying !== i,\n      onPlay: () => this.playTesti('B', i),\n    }));\n    const out = { testimonials };\n    const B = this.viewFor('B');\n    for (const k in B) out['b_' + k] = B[k];\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
